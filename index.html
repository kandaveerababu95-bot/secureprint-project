<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SecurePrint Login</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Firebase SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-white via-white to-blue-50 flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Logo -->
    <div class="flex items-center justify-center gap-2 mb-8">
      <div class="p-2 bg-blue-600 rounded-xl shadow-md">
        <i data-lucide="printer" class="w-6 h-6 text-white"></i>
      </div>
      <span class="text-xl font-bold text-center leading-tight">
        A Secure Mobile-Based Printing System with Multi-Printer Management, Dynamic Slot Booking, and Traffic-Aware Passcode Authentication
      </span>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-2xl shadow-xl p-8">

      <h2 class="text-2xl font-bold text-center mb-1">Sign In</h2>
      <p class="text-sm text-gray-500 text-center mb-6">
        Enter your credentials to access your account
      </p>

      <form id="loginForm" class="space-y-5">

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input id="email" type="email" placeholder="Enter your email" required
            class="w-full h-11 px-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <div class="relative">
            <input id="password" type="password" placeholder="Enter your password" required
              class="w-full h-11 px-3 pr-10 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"/>
            <button type="button" onclick="togglePassword()"
              class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500">
              <i id="eyeIcon" data-lucide="eye" class="w-4 h-4"></i>
            </button>
          </div>
        </div>

        <!-- Options -->
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2">
            <input type="checkbox" class="rounded"/>
            Remember me
          </label>
          <a href="#" id="forgotPassword" class="text-blue-600 hover:underline">
            Forgot password?
          </a>
        </div>

        <!-- Sign In Button -->
        <button type="submit"
          class="w-full h-11 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold transition">
          Sign In
        </button>
      </form>

      <!-- Footer -->
      <p class="text-center text-sm text-gray-500 mt-6">
        Don't have an account?
        <a href="signup.html" class="text-blue-600 font-medium hover:underline">Sign up</a>
      </p>
    </div>

    <p class="text-center text-xs text-gray-400 mt-6">
      © 2026 SecurePrint. All rights reserved.
    </p>
  </div>

  <!-- SCRIPT -->
  <script>
    lucide.createIcons();

    // Firebase config
    const firebaseConfig = {
      apiKey: "AIzaSyAGb989_gWkh0G63PGtY6GkKskbSL6lVvs",
      authDomain: "smart-printer-app-79846.firebaseapp.com",
      projectId: "smart-printer-app-79846",
      storageBucket: "smart-printer-app-79846.firebasestorage.app",
      messagingSenderId: "301344499556",
      appId: "1:301344499556:web:7908c13b4757b38d21bc71",
      measurementId: "G-DFL7775P8J"
    };

    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Toggle password visibility
    function togglePassword() {
      const input = document.getElementById("password");
      const icon = document.getElementById("eyeIcon");
      if (input.type === "password") {
        input.type = "text";
        icon.setAttribute("data-lucide", "eye-off");
      } else {
        input.type = "password";
        icon.setAttribute("data-lucide", "eye");
      }
      lucide.createIcons();
    }

    // Email/Password login
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      try {
        await auth.signInWithEmailAndPassword(email, password);
        alert("✅ Login successful!");
        localStorage.setItem("userLoggedIn", "true");
        window.location.href = "dashboard.html";
      } catch (error) {
        alert("❌ " + error.message);
      }
    });

    // Forgot password
    document.getElementById("forgotPassword").addEventListener("click", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value.trim();
      if (!email) { alert("⚠️ Please enter your email first."); return; }

      try {
        await auth.sendPasswordResetEmail(email);
        alert("📩 Password reset link sent! Check your email.");
      } catch (error) {
        console.error(error);
        alert("❌ " + (error.message || "Error sending reset link."));
      }
    });
  </script>
</body>
</html>
