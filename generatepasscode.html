<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Printer Booking</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
.hiddenStep { display:none; }

.paper {
  width: 80%;
  height: 100px;
  background: white;
  position: absolute;
  top: -120px;
  left: 10%;
  transition: 2s;
}
</style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-3xl bg-white rounded-2xl shadow p-6">

<!-- HEADER -->
<div class="flex items-center gap-3 mb-6">
  <div class="p-3 bg-blue-600 rounded-xl">
    <i data-lucide="printer" class="text-white w-6 h-6"></i>
  </div>
  <h1 class="text-2xl font-bold">Smart Printer Booking</h1>
</div>

<!-- ================= STEP 1 ================= -->
<div id="step1">
  <h2 class="font-semibold mb-3">Step 1: Book Time Slot</h2>

  <input id="username" placeholder="Enter Your Name"
    class="border rounded-lg p-2 w-full mb-3">

  <input type="datetime-local" id="bookingTime"
    class="border rounded-lg p-2 w-full mb-4">

  <button onclick="goToStep(2)"
    class="w-full bg-blue-600 text-white py-2 rounded-xl">
    Next →
  </button>
</div>

<!-- ================= STEP 2 ================= -->
<div id="step2" class="hiddenStep">
  <h2 class="font-semibold mb-3">Step 2: Select Printer</h2>

  <select id="printerSelect" class="border rounded-lg p-2 w-full mb-4">
    <option value="Reception">Printer 1 - Reception</option>
    <option value="Library">Printer 2 - Library</option>
    <option value="Lab">Printer 3 - Lab</option>
  </select>

  <button onclick="sendPasscodeSMS()"
    class="w-full bg-blue-600 text-white py-2 rounded-xl">
    Generate Passcode →
  </button>

  <div id="recaptcha-container"></div>
</div>

<!-- ================= STEP 3 ================= -->
<div id="step3" class="hiddenStep">
  <h2 class="font-semibold mb-3">Step 3: Enter OTP</h2>

  <input id="otpInput" placeholder="Enter OTP from SMS"
    class="border rounded-lg p-2 w-full mb-4">

  <button onclick="verifyOTP()"
    class="w-full bg-green-600 text-white py-2 rounded-xl mb-2">
    Verify OTP →
  </button>

  <div id="passcodeBox"
    class="text-center text-3xl font-bold text-green-600 mt-4"></div>

  <button onclick="goToStep(4)"
    class="w-full bg-blue-600 text-white py-2 rounded-xl mt-4">
    Go to Printer →
  </button>

  <button onclick="resetToStep1()"
    class="w-full bg-gray-300 py-2 rounded-xl mt-2">
    Book Another Slot
  </button>
</div>

<!-- ================= STEP 4 ================= -->
<div id="step4" class="hiddenStep">

  <div class="bg-gradient-to-b from-gray-700 to-gray-900 text-white rounded-2xl p-6 shadow-xl">

    <div class="font-bold mb-3">SMART IoT PRINTER</div>

    <div id="statusScreen"
      class="bg-black text-lime-400 font-mono p-3 rounded mb-3">
      STATUS: IDLE
    </div>

    <div class="mb-3">
      <strong>Queue:</strong> <span id="queueCount">0</span>
    </div>

    <input id="enteredPasscode" placeholder="Enter Passcode"
      class="text-black p-2 rounded mr-2">
    <button onclick="enterPasscode()" class="bg-blue-600 px-3 py-2 rounded">
      Submit
    </button>

    <div class="relative mt-6 h-28 bg-black rounded overflow-hidden">
      <div id="paper" class="paper"></div>
    </div>

  </div>
</div>

</div>

<!-- ⭐ CUSTOM MODAL -->
<div id="slotModal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
  <div class="bg-white rounded-2xl p-6 w-full max-w-sm text-center shadow-xl">

    <h3 class="text-lg font-bold mb-2">⚠ Slot Busy</h3>
    <p id="slotMessage" class="text-gray-600 mb-6"></p>

    <div class="flex gap-3">
      <button onclick="cancelSlot()" class="flex-1 bg-gray-300 py-2 rounded-xl">
        Cancel
      </button>
      <button onclick="continueSlot()" class="flex-1 bg-blue-600 text-white py-2 rounded-xl">
        Continue
      </button>
    </div>

  </div>
</div>

<script type="module">
lucide.createIcons();

/* ================= FIREBASE ================= */

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getAuth,
  RecaptchaVerifier,
  signInWithPhoneNumber
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_AUTH_DOMAIN",
  projectId: "YOUR_PROJECT_ID",
  appId: "YOUR_APP_ID"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= DATA ================= */

let bookings = [];
let printQueue = [];
let currentPrinting = null;
let pendingStep = null;

/* ================= STEP NAV ================= */

window.goToStep = function(step){

  if(step === 2){
    const name = username.value.trim();
    const time = bookingTime.value;

    if(!name) return alert("Enter your name");
    if(!time) return alert("Select booking time");

    const duplicate = bookings.find(
      b => b.name.toLowerCase() === name.toLowerCase() && !b.cancelled
    );
    if(duplicate) return alert("This name already has an active booking");

    const slotCount = bookings.filter(
      b => b.time === time && !b.cancelled
    ).length;

    if(slotCount >= 3){
      return alert("❌ Slot full (max 3 users). Choose another time.");
    }

    if(slotCount > 0){
      slotMessage.innerText =
        `${slotCount} member${slotCount>1?'s':''} already exist in the queue for this time slot.`;

      pendingStep = step;
      slotModal.classList.remove("hidden");
      slotModal.classList.add("flex");
      return;
    }
  }

  document.querySelectorAll("[id^=step]").forEach(s=>s.classList.add("hiddenStep"));
  document.getElementById("step"+step).classList.remove("hiddenStep");
};

/* ================= SMS SEND ================= */

window.sendPasscodeSMS = async function(){

  const user = auth.currentUser;
  if(!user) return alert("Please login first");

  const userDoc = await getDoc(doc(db,"users",user.uid));
  const phoneNumber = userDoc.data().phone;

  const formattedPhone =
    phoneNumber.startsWith("+91") ? phoneNumber : "+91"+phoneNumber;

  window.recaptchaVerifier = new RecaptchaVerifier(
    auth,
    "recaptcha-container",
    { size:"invisible" }
  );

  try{
    const confirmationResult = await signInWithPhoneNumber(
      auth,
      formattedPhone,
      window.recaptchaVerifier
    );

    window.confirmationResult = confirmationResult;
    alert("✅ OTP sent to your phone");
    goToStep(3);

  }catch(err){
    console.error(err);
    alert("❌ SMS failed");
  }
};

/* ================= VERIFY OTP ================= */

window.verifyOTP = async function(){

  const code = otpInput.value.trim();

  try{
    await window.confirmationResult.confirm(code);

    const passcode = Math.floor(100000 + Math.random()*900000);

    bookings.push({
      name: username.value.trim(),
      printer: printerSelect.value,
      time: bookingTime.value,
      passcode,
      entered:false,
      cancelled:false
    });

    passcodeBox.innerText = passcode;

  }catch{
    alert("❌ Invalid OTP");
  }
};

/* ================= REST (UNCHANGED) ================= */

window.resetToStep1 = function(){
  username.value = "";
  bookingTime.value = "";
  enteredPasscode.value = "";
  goToStep(1);
};

window.continueSlot = function(){
  slotModal.classList.add("hidden");
  slotModal.classList.remove("flex");

  document.querySelectorAll("[id^=step]").forEach(s=>s.classList.add("hiddenStep"));
  document.getElementById("step"+pendingStep).classList.remove("hiddenStep");
};

window.cancelSlot = function(){
  slotModal.classList.add("hidden");
  slotModal.classList.remove("flex");
};

window.enterPasscode = function(){

  const entered = enteredPasscode.value.trim();

  const booking = bookings.find(
    b => b.passcode == entered && !b.entered && !b.cancelled
  );

  if(!booking){
    statusScreen.innerText = "INVALID PASSCODE ❌";
    return;
  }

  const now = new Date();
  const start = new Date(booking.time);
  const expiry = new Date(start.getTime() + 10*60000);

  if(now < start){
    statusScreen.innerText =
      "⏳ Too early! Print at: " + start.toLocaleTimeString();
    return;
  }

  if(now > expiry){
    booking.cancelled = true;
    alert("Duration time has completed. Please book another slot.");
    statusScreen.innerText = "❌ SLOT EXPIRED";
    return;
  }

  booking.entered = true;
  printQueue.push(booking);
  updateQueueDisplay();
  processQueue();
};

function updateQueueDisplay(){
  const total = printQueue.length + (currentPrinting?1:0);
  queueCount.innerText = total;
}

function processQueue(){

  if(currentPrinting || printQueue.length===0) return;

  currentPrinting = printQueue.shift();
  updateQueueDisplay();

  statusScreen.innerText = "PRINTING: " + currentPrinting.name;
  paper.style.top = "10px";

  setTimeout(()=>{
    statusScreen.innerText = "PRINT COMPLETED ✔";
    paper.style.top = "-120px";
    currentPrinting = null;
    updateQueueDisplay();
    processQueue();
  },3000);
}
</script>

</body>
</html>
