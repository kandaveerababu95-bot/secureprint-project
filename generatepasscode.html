<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Printer Booking</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
.hiddenStep { display:none; }

.paper {
  width: 80%;
  height: 100px;
  background: white;
  position: absolute;
  top: -120px;
  left: 10%;
  transition: 2s;
}
</style>
</head>

<!-- ✅ CENTERED BODY -->
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<!-- ✅ CENTERED CARD -->
<div class="w-full max-w-3xl bg-white rounded-2xl shadow p-6">

<!-- HEADER -->
<div class="flex items-center gap-3 mb-6">
  <div class="p-3 bg-blue-600 rounded-xl">
    <i data-lucide="printer" class="text-white w-6 h-6"></i>
  </div>
  <h1 class="text-2xl font-bold">Smart Printer Booking</h1>
</div>

<!-- ================= STEP 1 (TIME FIRST) ================= -->
<div id="step1">
  <h2 class="font-semibold mb-3">Step 1: Book Time Slot</h2>

  <input id="username" placeholder="Enter Your Name"
    class="border rounded-lg p-2 w-full mb-3">

  <input type="datetime-local" id="bookingTime"
    class="border rounded-lg p-2 w-full mb-4">

  <button onclick="goToStep(2)"
    class="w-full bg-blue-600 text-white py-2 rounded-xl">
    Next →
  </button>
</div>

<!-- ================= STEP 2 ================= -->
<div id="step2" class="hiddenStep">
  <h2 class="font-semibold mb-3">Step 2: Select Printer</h2>

  <select id="printerSelect" class="border rounded-lg p-2 w-full mb-4">
    <option value="Reception">Printer 1 - Reception</option>
    <option value="Library">Printer 2 - Library</option>
    <option value="Lab">Printer 3 - Lab</option>
  </select>

  <button onclick="generatePasscode()"
    class="w-full bg-blue-600 text-white py-2 rounded-xl">
    Generate Passcode →
  </button>
</div>

<!-- ================= STEP 3 ================= -->
<div id="step3" class="hiddenStep">
  <h2 class="font-semibold mb-3">Step 3: Your Passcode</h2>

  <div id="passcodeBox"
    class="text-center text-3xl font-bold text-green-600 mb-4"></div>

  <button onclick="goToStep(4)"
    class="w-full bg-blue-600 text-white py-2 rounded-xl">
    Go to Printer →
  </button>
</div>

<!-- ================= STEP 4 ================= -->
<div id="step4" class="hiddenStep">

  <div class="bg-gradient-to-b from-gray-700 to-gray-900 text-white rounded-2xl p-6 shadow-xl">

    <div class="font-bold mb-3">SMART IoT PRINTER</div>

    <div id="statusScreen"
      class="bg-black text-lime-400 font-mono p-3 rounded mb-3">
      STATUS: IDLE
    </div>

    <div class="mb-3">
      <strong>Queue:</strong> <span id="queueCount">0</span>
    </div>

    <input id="enteredPasscode" placeholder="Enter Passcode"
      class="text-black p-2 rounded mr-2">
    <button onclick="enterPasscode()" class="bg-blue-600 px-3 py-2 rounded">
      Submit
    </button>

    <div class="relative mt-6 h-28 bg-black rounded overflow-hidden">
      <div id="paper" class="paper"></div>
    </div>

  </div>
</div>

</div>

<script>
lucide.createIcons();

/* ================= DATA ================= */

let bookings = [];
let printQueue = [];
let currentPrinting = null;

/* ================= STEP NAV ================= */

function goToStep(step){

  // validation before moving from step1
  if(step === 2){
    const name = username.value.trim();
    const time = bookingTime.value;

    if(!name) return alert("Enter your name");
    if(!time) return alert("Select booking time");

    // ❌ duplicate name check
    const duplicate = bookings.find(
      b => b.name.toLowerCase() === name.toLowerCase() && !b.cancelled
    );
    if(duplicate) return alert("This name already has an active booking");

    // ❌ only 3 users per slot
    const slotCount = bookings.filter(
      b => b.time === time && !b.cancelled
    ).length;

    if(slotCount >= 3){
      return alert("❌ Slot full (max 3 users). Choose another time.");
    }
  }

  document.querySelectorAll("[id^=step]").forEach(s=>s.classList.add("hiddenStep"));
  document.getElementById("step"+step).classList.remove("hiddenStep");
}

/* ================= PASSCODE ================= */

function generatePasscode(){

  const name = username.value.trim();
  const printer = printerSelect.value;
  const time = bookingTime.value;

  const passcode = Math.floor(100000 + Math.random()*900000);

  bookings.push({
    name,
    printer,
    time,
    passcode,
    entered:false,
    cancelled:false
  });

  passcodeBox.innerText = passcode;
  goToStep(3);
}

/* ================= PRINTER ================= */

function enterPasscode(){

  const entered = enteredPasscode.value.trim();

  const booking = bookings.find(
    b => b.passcode == entered && !b.entered && !b.cancelled
  );

  if(!booking){
    statusScreen.innerText = "INVALID PASSCODE ❌";
    return;
  }

  const now = new Date();
  const start = new Date(booking.time);
  const expiry = new Date(start.getTime() + 10*60000); // +10 minutes

  // ❌ before time
  if(now < start){
    statusScreen.innerText =
      "⏳ Too early! Print at: " +
      start.toLocaleTimeString();
    return;
  }

  // ❌ after expiry
  if(now > expiry){
    booking.cancelled = true;
    alert("Duration time has completed. Please book another slot.");
    statusScreen.innerText = "❌ SLOT EXPIRED";
    return;
  }

  booking.entered = true;
  printQueue.push(booking);
  updateQueueDisplay();
  processQueue();
}

/* ================= QUEUE ================= */

function updateQueueDisplay(){
  const total = printQueue.length + (currentPrinting?1:0);
  queueCount.innerText = total;
}

function processQueue(){

  if(currentPrinting || printQueue.length===0) return;

  currentPrinting = printQueue.shift();
  updateQueueDisplay();

  statusScreen.innerText = "PRINTING: " + currentPrinting.name;
  paper.style.top = "10px";

  setTimeout(()=>{
    statusScreen.innerText = "PRINT COMPLETED ✔";
    paper.style.top = "-120px";
    currentPrinting = null;
    updateQueueDisplay();
    processQueue();
  },3000);
}
</script>

</body>
</html>
