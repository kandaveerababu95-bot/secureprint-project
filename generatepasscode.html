<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart Printer Booking</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
.hiddenStep{display:none;}

.paper{
  width:80%;
  height:100px;
  background:white;
  position:absolute;
  top:-120px;
  left:10%;
  transition:2s;
}

.printer-card{transition:.2s;}
</style>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-6">

<div class="w-full max-w-4xl bg-white rounded-2xl shadow p-6">

<!-- HEADER -->
<div class="flex items-center gap-3 mb-6">
  <div class="p-3 bg-blue-600 rounded-xl">
    <i data-lucide="printer" class="text-white w-6 h-6"></i>
  </div>
  <h1 class="text-2xl font-bold">Smart Printer Booking</h1>
</div>

<!-- ================= STEP 1 ================= -->
<div id="step1">
  <h2 class="font-semibold mb-3">Step 1: Book Time Slot</h2>

  <input id="username" placeholder="Enter Your Name"
    class="border rounded-lg p-2 w-full mb-3">

  <input id="userEmail" type="email" placeholder="Enter Your Email"
    class="border rounded-lg p-2 w-full mb-3">

  <input type="datetime-local" id="bookingTime"
    class="border rounded-lg p-2 w-full mb-4">

  <button onclick="goToStep(2)"
    class="w-full bg-blue-600 text-white py-2 rounded-xl">
    Next →
  </button>
</div>

<!-- ================= STEP 2 ================= -->
<div id="step2" class="hiddenStep">
  <h2 class="font-semibold mb-3">Step 2: Select Printer</h2>

  <select id="printerSelect" class="border rounded-lg p-2 w-full mb-4">
    <option value="Auditorium">Printer 1 - Auditorium</option>
    <option value="Library">Printer 2 - Library</option>
    <option value="Lab">Printer 3 - Lab</option>
  </select>

  <button onclick="sendPasscodeEmail()"
    class="w-full bg-blue-600 text-white py-2 rounded-xl">
    Generate Passcode →
  </button>
</div>

<!-- ================= STEP 3 ================= -->
<div id="step3" class="hiddenStep">
  <h2 class="font-semibold mb-3">Step 3: Passcode Sent</h2>

  <div class="text-center text-green-600 font-bold mb-4">
    ✅ Passcode sent to your email
  </div>

  <button onclick="goToStep(4)"
    class="w-full bg-blue-600 text-white py-2 rounded-xl mb-2">
    Go to Print →
  </button>

  <button onclick="resetToStep1()"
    class="w-full bg-gray-300 py-2 rounded-xl">
    Book Another Slot
  </button>
</div>

<!-- ================= STEP 4 ================= -->
<div id="step4" class="hiddenStep">

  <div class="bg-gradient-to-b from-gray-700 to-gray-900 text-white rounded-2xl p-6 shadow-xl">

    <div class="font-bold mb-4 text-lg">SMART IoT PRINTER DASHBOARD</div>

    <div id="statusScreen"
      class="bg-black text-lime-400 font-mono p-3 rounded mb-4">
      STATUS: IDLE
    </div>

    <!-- ✅ SELECTED INFO -->
    <div class="bg-black rounded p-3 mb-4 text-sm">
      <div><b>Printer:</b> <span id="selectedPrinterText"></span></div>
      <div><b>Slot Time:</b> <span id="selectedTimeText"></span></div>

      <div class="mt-2"><b>Files to Print:</b></div>
      <div id="printFileList" class="text-lime-400"></div>
    </div>

    <!-- PRINTER CARDS -->
    <div class="grid grid-cols-3 gap-3 mb-4">

      <div id="cardAuditorium" class="printer-card bg-gray-800 rounded-xl p-3 text-center">
        <div class="font-bold">Auditorium</div>
        <div class="text-2xl" id="jobAuditorium">0</div>
        <div class="text-xs text-gray-300">jobs</div>
      </div>

      <div id="cardLibrary" class="printer-card bg-gray-800 rounded-xl p-3 text-center">
        <div class="font-bold">Library</div>
        <div class="text-2xl" id="jobLibrary">0</div>
        <div class="text-xs text-gray-300">jobs</div>
      </div>

      <div id="cardLab" class="printer-card bg-gray-800 rounded-xl p-3 text-center">
        <div class="font-bold">Lab</div>
        <div class="text-2xl" id="jobLab">0</div>
        <div class="text-xs text-gray-300">jobs</div>
      </div>

    </div>

    <input id="enteredPasscode" placeholder="Enter Passcode"
      class="text-black p-2 rounded mr-2">
    <button onclick="enterPasscode()" class="bg-blue-600 px-3 py-2 rounded">
      Print
    </button>

    <div class="relative mt-6 h-28 bg-black rounded overflow-hidden">
      <div id="paper" class="paper"></div>
    </div>

  </div>
</div>

</div>

<script>
lucide.createIcons();
(function(){emailjs.init("WNKsaeu7XjvuUWBWc");})();

/* ================= LOAD FILES ================= */

let uploadedFiles = JSON.parse(localStorage.getItem("uploadedFiles")||"[]");

/* ================= DATA ================= */

let bookings=[];

let printerQueues={
  Auditorium:[],
  Library:[],
  Lab:[]
};

let currentPrinting={
  Auditorium:null,
  Library:null,
  Lab:null
};

/* ================= STEP NAV ================= */

function goToStep(step){

  if(step===2){
    if(!username.value.trim()) return alert("Enter your name");
    if(!userEmail.value.trim()) return alert("Enter your email");
    if(!bookingTime.value) return alert("Select booking time");
    if(!uploadedFiles.length) return alert("Upload file first");
  }

  document.querySelectorAll("[id^=step]")
    .forEach(s=>s.classList.add("hiddenStep"));

  document.getElementById("step"+step)
    .classList.remove("hiddenStep");

  if(step===4) loadPrintView();
}

/* ================= SEND EMAIL ================= */

async function sendPasscodeEmail(){

  const name=username.value.trim();
  const printer=printerSelect.value;
  const time=bookingTime.value;
  const email=userEmail.value.trim();
  const passcode=Math.floor(100000+Math.random()*900000);

  try{
    await emailjs.send(
      "service_02wzsbu",
      "template_f0asueu",
      {user_name:name,passcode:passcode,to_email:email}
    );

    bookings.push({
      name,printer,time,passcode,
      files:uploadedFiles,
      entered:false
    });

    goToStep(3);

  }catch(err){
    console.error(err);
    alert("Email failed");
  }
}

/* ================= LOAD PRINT VIEW ================= */

function loadPrintView(){

  const lastBooking=bookings[bookings.length-1];
  if(!lastBooking) return;

  selectedPrinterText.innerText=lastBooking.printer;
  selectedTimeText.innerText=
    new Date(lastBooking.time).toLocaleString();

  const list=document.getElementById("printFileList");
  list.innerHTML="";

  lastBooking.files.forEach(f=>{
    list.innerHTML+=`<div>📄 ${f.name}</div>`;
  });

  showOnlySelectedPrinter(lastBooking.printer);
  updateAllDisplays();
}

/* ================= SHOW PRINTER ================= */

function showOnlySelectedPrinter(printer){
  ["Auditorium","Library","Lab"].forEach(p=>{
    document.getElementById("card"+p).style.display=
      (p===printer)?"block":"none";
  });
}

/* ================= ENTER PASSCODE ================= */

function enterPasscode(){

  const entered=enteredPasscode.value.trim();
  const booking=bookings.find(b=>b.passcode==entered && !b.entered);

  if(!booking){
    statusScreen.innerText="INVALID PASSCODE ❌";
    return;
  }

  if(new Date()<new Date(booking.time)){
    statusScreen.innerText="⏳ SLOT TIME NOT STARTED";
    return;
  }

  booking.entered=true;
  const printer=booking.printer;

  printerQueues[printer].push(booking);
  updateAllDisplays();
  processQueue(printer);
}

/* ================= UPDATE COUNTS ================= */

function updateAllDisplays(){
  jobAuditorium.innerText=
    printerQueues.Auditorium.length+(currentPrinting.Auditorium?1:0);
  jobLibrary.innerText=
    printerQueues.Library.length+(currentPrinting.Library?1:0);
  jobLab.innerText=
    printerQueues.Lab.length+(currentPrinting.Lab?1:0);
}

/* ================= PROCESS ================= */

function processQueue(printer){

  if(currentPrinting[printer]||printerQueues[printer].length===0) return;

  currentPrinting[printer]=printerQueues[printer].shift();
  updateAllDisplays();

  statusScreen.innerText="PRINTING ("+printer+")";

  paper.style.top="10px";

  setTimeout(()=>{
    statusScreen.innerText="PRINT COMPLETED ✔";
    paper.style.top="-120px";

    currentPrinting[printer]=null;
    updateAllDisplays();
    processQueue(printer);
  },3000);
}

/* ================= RESET ================= */

function resetToStep1(){
  goToStep(1);
}
</script>

</body>
</html>
