<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Secure Mobile-Based Printing System</title>

  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-md">

    <!-- Header -->
    <div class="text-center mb-6">
      <div class="flex items-center justify-center gap-2 mb-2">
        <div class="bg-blue-600 p-2 rounded-lg">
          <i data-lucide="printer" class="text-white w-6 h-6"></i>
        </div>
        <h1 class="text-2xl font-bold">
          A Secure Mobile-Based Printing System with Multi-Printer Management, Dynamic Slot Booking, and Traffic-Aware Passcode Authentication
        </h1>
      </div>
      <p class="text-gray-600">Create your account</p>
    </div>

    <!-- Card -->
    <div class="bg-white rounded-xl shadow-md p-6">
      <h2 class="text-xl font-semibold mb-1">Get Started</h2>
      <p class="text-gray-500 mb-4">
        Join SecurePrint for secure printing
      </p>

      <form id="signupForm" class="space-y-4">

        <!-- Username -->
        <div>
          <label class="block text-sm font-medium mb-1">Username</label>
          <input
            id="username"
            type="text"
            required
            class="w-full border rounded-lg px-3 py-2"
            placeholder="Choose a username (3-20 characters)"
          />
        </div>

        <!-- Email -->
        <div>
          <label class="block text-sm font-medium mb-1">Email</label>
          <input
            id="email"
            type="email"
            required
            class="w-full border rounded-lg px-3 py-2"
            placeholder="Enter your email"
          />
        </div>

        <!-- Phone -->
        <div>
          <label class="block text-sm font-medium mb-1">Phone Number</label>
          <input
            id="phone"
            type="tel"
            required
            inputmode="numeric"
            class="w-full border rounded-lg px-3 py-2"
            placeholder="Enter your phone number"
          />
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium mb-1">Password</label>
          <input
            id="password"
            type="password"
            required
            class="w-full border rounded-lg px-3 py-2"
            placeholder="Create a strong password"
          />
        </div>

        <!-- Confirm Password -->
        <div>
          <label class="block text-sm font-medium mb-1">Confirm Password</label>
          <input
            id="confirmPassword"
            type="password"
            required
            class="w-full border rounded-lg px-3 py-2"
            placeholder="Confirm your password"
          />
        </div>

        <!-- Button -->
        <button
          type="submit"
          class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 rounded-lg font-medium"
        >
          Create Account
        </button>

        <p class="text-center text-sm text-gray-600">
          Already have an account?
          <a href="login.html" class="text-blue-600 font-medium hover:underline">
            Sign in here
          </a>
        </p>
      </form>
    </div>
  </div>

  <!-- ✅ Validation Script -->
  <script>
    lucide.createIcons();

    document
      .getElementById("signupForm")
      .addEventListener("submit", function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const phone = document.getElementById("phone").value.trim();
        const password = document.getElementById("password").value;
        const confirmPassword =
          document.getElementById("confirmPassword").value;

        // ✅ Email validation
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;

        // ✅ Indian phone validation
        const phoneRegex = /^(\+91[\-\s]?)?[6-9]\d{9}$/;

        // ✅ Strong password
        const passwordRegex =
          /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[@$!%*?&]).{8,}$/;

        // ❌ Email invalid
        if (!emailRegex.test(email)) {
          alert("❌ Please enter a valid email address.");
          return;
        }

        // ❌ Phone invalid
        if (!phoneRegex.test(phone)) {
          alert("❌ Please enter a valid Indian phone number.");
          return;
        }

        // ❌ Password weak
        if (!passwordRegex.test(password)) {
          alert(
            "❌ Password must be at least 8 characters and include uppercase, lowercase, number, and special character."
          );
          return;
        }

        // ❌ Password mismatch
        if (password !== confirmPassword) {
          alert("❌ Passwords do not match.");
          return;
        }

        // ✅ Success
        alert("✅ Account created successfully!");

        // 🔥 Redirect to dashboard page
        window.location.href = "dashboard.html";
      });
  </script>
</body>
</html>
