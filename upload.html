<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Documents</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/lucide@latest"></script>

<style>
.paper {
  width: 80%;
  height: 100px;
  background: white;
  position: absolute;
  top: -120px;
  left: 10%;
  transition: 2s;
}
</style>
</head>

<body class="bg-gray-100 min-h-screen p-6">

<!-- Header -->
<div class="max-w-6xl mx-auto mb-6">
  <div class="flex items-center gap-3">
    <div class="p-3 bg-blue-600 rounded-xl">
      <i data-lucide="printer" class="text-white w-6 h-6"></i>
    </div>
    <div>
      <h1 class="text-2xl font-bold">Upload Documents</h1>
      <p class="text-gray-500">Upload text files and images for printing</p>
    </div>
  </div>
</div>

<div class="max-w-6xl mx-auto grid md:grid-cols-3 gap-6">

  <!-- LEFT PANEL -->
  <div class="md:col-span-2 bg-white rounded-2xl shadow p-6">

    <h3 class="font-semibold mb-4">Select Files</h3>

    <!-- Drop Zone -->
    <div id="dropZone"
      class="border-2 border-dashed rounded-xl p-10 text-center cursor-pointer hover:bg-gray-50">

      <i data-lucide="upload" class="mx-auto w-10 h-10 text-gray-400 mb-3"></i>

      <p class="font-medium">Drop files here or click to browse</p>
      <p class="text-sm text-gray-400 mt-1">
        Supported formats: PDF, TXT, DOC, Images only
      </p>

      <button class="mt-4 px-4 py-2 border rounded-lg">Browse Files</button>

      <!-- ✅ STRICT FILE FILTER -->
      <input type="file" id="fileInput" class="hidden"
        accept=".txt,.pdf,.doc,.docx,.ppt,.pptx,.jpg,.jpeg,.png,.gif,.webp"
        multiple>

      <p class="text-xs text-gray-400 mt-3">Maximum file size: 50MB per file</p>
    </div>

    <button id="proceedBtn"
      class="mt-6 w-full bg-blue-300 text-white py-2 rounded-xl cursor-not-allowed"
      disabled>
      Proceed to Generate Passcode
    </button>

  </div>

  <!-- RIGHT SUMMARY -->
  <div class="bg-white rounded-2xl shadow p-6 h-fit">
    <h3 class="font-semibold mb-4">Summary</h3>

    <p class="text-sm text-gray-500">Files Selected</p>
    <p id="fileCount" class="text-2xl font-bold text-blue-600">0</p>

    <p class="text-sm text-gray-500 mt-4">Total Size</p>
    <p id="totalSize" class="font-semibold">0.00 MB</p>
  </div>
</div>

<script>
lucide.createIcons();

/* ================= FILE HANDLING ================= */

const fileInput = document.getElementById("fileInput");
const dropZone = document.getElementById("dropZone");
const fileCount = document.getElementById("fileCount");
const totalSize = document.getElementById("totalSize");
const proceedBtn = document.getElementById("proceedBtn");

dropZone.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", handleFiles);

dropZone.addEventListener("dragover", e => {
  e.preventDefault();
  dropZone.classList.add("bg-gray-50");
});

dropZone.addEventListener("dragleave", () => {
  dropZone.classList.remove("bg-gray-50");
});

dropZone.addEventListener("drop", e => {
  e.preventDefault();
  dropZone.classList.remove("bg-gray-50");
  fileInput.files = e.dataTransfer.files;
  handleFiles();
});

/* ✅ STRICT VALIDATION — TEXT + IMAGE ONLY */
function handleFiles() {
  const files = fileInput.files;
  if (!files.length) return;

  let total = 0;

  const allowed = [
    "txt","pdf","doc","docx","ppt","pptx",
    "jpg","jpeg","png","gif","webp"
  ];

  for (let f of files) {
    const ext = f.name.split(".").pop().toLowerCase();

    if (!allowed.includes(ext)) {
      alert("❌ Only TEXT and IMAGE files are allowed.\nAudio and Video files are NOT permitted.");
      resetUI();
      return;
    }

    total += f.size;
  }

  fileCount.innerText = files.length;
  totalSize.innerText = (total / (1024*1024)).toFixed(2) + " MB";

  proceedBtn.disabled = false;
  proceedBtn.classList.remove("bg-blue-300","cursor-not-allowed");
  proceedBtn.classList.add("bg-blue-600");
}

/* ✅ Reset if invalid */
function resetUI(){
  fileInput.value = "";
  fileCount.innerText = "0";
  totalSize.innerText = "0.00 MB";
  proceedBtn.disabled = true;
  proceedBtn.classList.add("bg-blue-300","cursor-not-allowed");
  proceedBtn.classList.remove("bg-blue-600");
}

/* ✅ Redirect to passcode page */
proceedBtn.addEventListener("click", () => {
  if (!fileInput.files.length) {
    alert("Please select files first");
    return;
  }

  localStorage.setItem("fileCount", fileInput.files.length);
  window.location.href = "generatepasscode.html";
});
</script>

</body>
</html>
